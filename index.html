<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇩🇪 NL ↔ DE Flashcards</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card-bg: #22263a;
    --card-border: #2e3354;
    --accent: #6c8ef5;
    --accent2: #a78bfa;
    --good: #34d399;
    --bad: #f87171;
    --text: #e8eaf6;
    --muted: #8891b4;
    --radius: 18px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  #progress-bar-wrap {
    width: 100%;
    max-width: 560px;
    height: 6px;
    background: var(--card-border);
    border-radius: 99px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  #stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
    font-size: 0.88rem;
    color: var(--muted);
  }

  #stats span { display: flex; align-items: center; gap: 5px; }
  #stats .stat-good { color: var(--good); }
  #stats .stat-bad { color: var(--bad); }

  .scene {
    width: 100%;
    max-width: 560px;
    height: 240px;
    perspective: 1000px;
    margin-bottom: 28px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    border: 1.5px solid var(--card-border);
    text-align: center;
  }

  .card-front {
    background: var(--card-bg);
  }

  .card-back {
    background: linear-gradient(135deg, #1e2340, #252a48);
    transform: rotateY(180deg);
    border-color: var(--accent);
  }

  .card-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 14px;
    font-weight: 600;
  }

  .card-front .card-label { color: var(--muted); }
  .card-back .card-label { color: var(--accent2); }

  .card-text {
    font-size: 1.35rem;
    font-weight: 600;
    line-height: 1.5;
  }

  .card-front .card-text { color: var(--text); }
  .card-back .card-text { color: #c7d2fe; }

  .card-category {
    margin-top: 12px;
    font-size: 0.72rem;
    color: var(--muted);
    background: rgba(108, 142, 245, 0.1);
    border: 1px solid rgba(108, 142, 245, 0.2);
    padding: 3px 10px;
    border-radius: 99px;
  }

  #controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 560px;
  }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
    font-family: var(--font);
  }

  .btn:hover { transform: translateY(-2px); opacity: 0.92; }
  .btn:active { transform: scale(0.97); }

  #btn-show {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    width: 100%;
    box-shadow: 0 4px 24px rgba(108,142,245,0.3);
  }

  .answer-btns {
    display: flex;
    gap: 14px;
    width: 100%;
  }

  #btn-good {
    background: var(--good);
    color: #052e16;
    flex: 1;
  }

  #btn-bad {
    background: var(--bad);
    color: #450a0a;
    flex: 1;
  }

  .hidden { display: none !important; }

  /* Summary Screen */
  #summary {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 560px;
    width: 100%;
    gap: 20px;
  }

  #summary.active { display: flex; }

  #summary h2 {
    font-size: 1.7rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--good), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    width: 100%;
  }

  .summary-stat {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius);
    padding: 20px 12px;
  }

  .summary-stat .num { font-size: 2rem; font-weight: 700; }
  .summary-stat .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .summary-stat.good .num { color: var(--good); }
  .summary-stat.bad .num { color: var(--bad); }
  .summary-stat.total .num { color: var(--accent); }

  .summary-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  #btn-retry-errors {
    background: linear-gradient(135deg, var(--bad), #c05474);
    color: #fff;
    width: 100%;
    padding: 16px;
  }

  #btn-restart {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    color: var(--text);
    width: 100%;
    padding: 16px;
  }

  /* Mode selector */
  #mode-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    background: var(--surface);
    border-radius: 12px;
    padding: 6px;
  }

  .mode-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* Errors list */
  #errors-panel {
    display: none;
    width: 100%;
    max-width: 560px;
    margin-top: 16px;
  }

  #errors-panel.active { display: block; }
  #errors-panel h3 { color: var(--bad); margin-bottom: 12px; font-size: 0.9rem; }

  .error-item {
    background: var(--surface);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
  }

  .error-item .nl { color: var(--text); }
  .error-item .de { color: var(--muted); }

  #game { width: 100%; display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<header>
  <h1>🇩🇪 NL ↔ DE Flashcards</h1>
  <p id="deck-info">Alle kaarten laden...</p>
</header>

<div id="mode-selector">
  <button class="mode-btn active" onclick="setMode('all')">Alle kaarten</button>
  <button class="mode-btn" onclick="setMode('errors')">Fouten herhalen</button>
</div>

<div id="game">
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="stats">
    <span>📊 <span id="stat-pos">0</span> / <span id="stat-total">0</span></span>
    <span class="stat-good">✓ <span id="stat-good">0</span></span>
    <span class="stat-bad">✗ <span id="stat-bad">0</span></span>
  </div>

  <div class="scene">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="card-label">🇳🇱 Nederlands</div>
        <div class="card-text" id="front-text">–</div>
        <div class="card-category" id="front-cat"></div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">🇩🇪 Duits</div>
        <div class="card-text" id="back-text">–</div>
      </div>
    </div>
  </div>

  <div id="controls">
    <button class="btn" id="btn-show" onclick="showAnswer()">Toon antwoord</button>
    <div class="answer-btns hidden" id="answer-btns">
      <button class="btn" id="btn-good" onclick="answer(true)">✓ Goed</button>
      <button class="btn" id="btn-bad" onclick="answer(false)">✗ Fout</button>
    </div>
  </div>
</div>

<div id="summary">
  <h2 id="summary-title">Ronde voltooid! 🎉</h2>
  <p id="summary-sub" style="color:var(--muted);font-size:0.9rem"></p>
  <div class="summary-grid">
    <div class="summary-stat total"><div class="num" id="s-total">0</div><div class="lbl">Totaal</div></div>
    <div class="summary-stat good"><div class="num" id="s-good">0</div><div class="lbl">Goed</div></div>
    <div class="summary-stat bad"><div class="num" id="s-bad">0</div><div class="lbl">Fout</div></div>
  </div>
  <div class="summary-btns">
    <button class="btn" id="btn-retry-errors" onclick="retryErrors()">🔁 Herhaal fouten (<span id="error-count">0</span>)</button>
    <button class="btn" id="btn-restart" onclick="restartAll()">↺ Begin opnieuw (alle kaarten)</button>
  </div>
  <div id="errors-panel">
    <h3>❌ Gemaakte fouten:</h3>
    <div id="errors-list"></div>
  </div>
</div>

// ── State ──────────────────────────────────────────────────────────────────
let deck = [];
let errorCards = JSON.parse(localStorage.getItem('fc_errors') || '[]');
let current = 0;
let goodCount = 0;
let badCount = 0;
let sessionErrors = [];
let mode = 'all';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'all') || (i === 1 && m === 'errors'));
  });
  if (m === 'errors') {
    if (errorCards.length === 0) {
      alert('Je hebt nog geen foutenlijst. Maak eerst een ronde!');
      setMode('all');
      return;
    }
    startDeck(errorCards);
  } else {
    startDeck(ALL_CARDS);
  }
}

function startDeck(cards) {
  deck = shuffle(cards);
  current = 0;
  goodCount = 0;
  badCount = 0;
  sessionErrors = [];
  document.getElementById('summary').classList.remove('active');
  document.getElementById('summary').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('stat-total').textContent = deck.length;
  document.getElementById('deck-info').textContent = `${deck.length} kaarten • ${[...new Set(deck.map(c => c.cat))].length} categorieën`;
  showCard();
}

function showCard() {
  if (current >= deck.length) { showSummary(); return; }
  const c = deck[current];
  document.getElementById('front-text').textContent = c.nl;
  document.getElementById('back-text').textContent = c.de;
  document.getElementById('front-cat').textContent = c.cat;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('btn-show').classList.remove('hidden');
  document.getElementById('answer-btns').classList.add('hidden');
  updateStats();
}

function showAnswer() {
  document.getElementById('card').classList.add('flipped');
  document.getElementById('btn-show').classList.add('hidden');
  document.getElementById('answer-btns').classList.remove('hidden');
}

function answer(correct) {
  if (correct) {
    goodCount++;
  } else {
    badCount++;
    sessionErrors.push(deck[current]);
    // merge into persistent error list (deduplicate by nl)
    const existing = errorCards.map(c => c.nl);
    if (!existing.includes(deck[current].nl)) {
      errorCards.push(deck[current]);
    }
    localStorage.setItem('fc_errors', JSON.stringify(errorCards));
  }
  current++;
  showCard();
}

function updateStats() {
  document.getElementById('stat-pos').textContent = current + 1;
  document.getElementById('stat-good').textContent = goodCount;
  document.getElementById('stat-bad').textContent = badCount;
  const pct = deck.length ? (current / deck.length * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function showSummary() {
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('game').style.display = 'none';
  const s = document.getElementById('summary');
  s.style.display = 'flex';
  s.classList.add('active');

  const pct = deck.length ? Math.round(goodCount / deck.length * 100) : 0;
  document.getElementById('summary-title').textContent =
    pct >= 80 ? 'Uitstekend! 🎉' : pct >= 50 ? 'Goed gedaan! 👍' : 'Blijf oefenen! 💪';
  document.getElementById('summary-sub').textContent = `Score: ${pct}% correct (${goodCount}/${deck.length})`;
  document.getElementById('s-total').textContent = deck.length;
  document.getElementById('s-good').textContent = goodCount;
  document.getElementById('s-bad').textContent = badCount;
  document.getElementById('error-count').textContent = sessionErrors.length;

  const btn = document.getElementById('btn-retry-errors');
  btn.style.display = sessionErrors.length > 0 ? 'block' : 'none';

  // Show errors list
  const list = document.getElementById('errors-list');
  list.innerHTML = '';
  if (sessionErrors.length > 0) {
    document.getElementById('errors-panel').classList.add('active');
    sessionErrors.forEach(c => {
      const div = document.createElement('div');
      div.className = 'error-item';
      div.innerHTML = `<span class="nl">${c.nl}</span><span class="de">${c.de}</span>`;
      list.appendChild(div);
    });
  } else {
    document.getElementById('errors-panel').classList.remove('active');
  }
}

function retryErrors() {
  startDeck(sessionErrors.length > 0 ? sessionErrors : errorCards);
}

function restartAll() {
  setMode('all');
}

// Init
startDeck(ALL_CARDS);
</script>
